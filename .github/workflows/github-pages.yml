# Flutter Web を GitHub Pages に公開（プロジェクトサイト: https://<user>.github.io/<repo>/）
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 進行中デプロイを cancel すると GitHub Pages 側が不安定になることがある
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter config --enable-web
      - run: flutter pub get
      - name: Build web
        run: flutter build web --release --base-href="/${{ github.event.repository.name }}/" --no-wasm-dry-run

      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (1/5)
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry (60s)
        if: steps.deploy.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (2/5)
        id: deploy2
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry (60s)
        if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (3/5)
        id: deploy3
        if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry (90s)
        if: >-
          steps.deploy.outcome == 'failure' &&
          steps.deploy2.outcome == 'failure' &&
          steps.deploy3.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (4/5)
        id: deploy4
        if: >-
          steps.deploy.outcome == 'failure' &&
          steps.deploy2.outcome == 'failure' &&
          steps.deploy3.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry (90s)
        if: >-
          steps.deploy.outcome == 'failure' &&
          steps.deploy2.outcome == 'failure' &&
          steps.deploy3.outcome == 'failure' &&
          steps.deploy4.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (5/5)
        id: deploy5
        if: >-
          steps.deploy.outcome == 'failure' &&
          steps.deploy2.outcome == 'failure' &&
          steps.deploy3.outcome == 'failure' &&
          steps.deploy4.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Fail if all deploy attempts failed
        if: >-
          steps.deploy.outcome == 'failure' &&
          (steps.deploy2.outcome == 'failure' || steps.deploy2.outcome == 'skipped') &&
          (steps.deploy3.outcome == 'failure' || steps.deploy3.outcome == 'skipped') &&
          (steps.deploy4.outcome == 'failure' || steps.deploy4.outcome == 'skipped') &&
          (steps.deploy5.outcome == 'failure' || steps.deploy5.outcome == 'skipped')
        run: |
          echo "GitHub Pages deploy failed after 5 retries."
          echo "This is usually a transient GitHub Pages error."
          echo "Re-run this workflow from Actions tab (workflow_dispatch)."
          exit 1
